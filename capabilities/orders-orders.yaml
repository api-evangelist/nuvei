naftiko: 1.0.0-alpha2
info:
  label: Nuvei Order API — Orders
  description: Create and update orders prior to payment via openOrder and updateOrder.
  tags:
  - Nuvei
  - Orders
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    NUVEI_MERCHANT_ID: NUVEI_MERCHANT_ID
    NUVEI_MERCHANT_SITE_ID: NUVEI_MERCHANT_SITE_ID
    NUVEI_MERCHANT_SECRET_KEY: NUVEI_MERCHANT_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: orders-orders
    baseUri: https://secure.safecharge.com
    resources:
    - name: openOrder
      path: /ppp/api/v1/openOrder.do
      operations:
      - name: openorder
        method: POST
        description: Nuvei Open Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: updateOrder
      path: /ppp/api/v1/updateOrder.do
      operations:
      - name: updateorder
        method: POST
        description: Nuvei Update Order
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: orders-orders-rest
    port: 8080
    resources:
    - path: /v1/orders
      name: openOrder
      operations:
      - method: POST
        name: openorder
        call: orders-orders.openorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/orders/update
      name: updateOrder
      operations:
      - method: POST
        name: updateorder
        call: orders-orders.updateorder
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: orders-orders-mcp
    port: 9090
    transport: http
    tools:
    - name: nuvei-open-order
      description: Nuvei Open Order
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: orders-orders.openorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nuvei-update-order
      description: Nuvei Update Order
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: orders-orders.updateorder
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
