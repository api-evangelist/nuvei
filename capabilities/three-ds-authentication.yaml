naftiko: 1.0.0-alpha2
info:
  label: Nuvei 3DS API — Authentication
  description: 3D Secure 2 authentication flows for PSD2 SCA compliance.
  tags:
  - Nuvei
  - 3DS
  - SCA
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    NUVEI_MERCHANT_ID: NUVEI_MERCHANT_ID
    NUVEI_MERCHANT_SITE_ID: NUVEI_MERCHANT_SITE_ID
    NUVEI_MERCHANT_SECRET_KEY: NUVEI_MERCHANT_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: three-ds
    baseUri: https://secure.safecharge.com
    resources:
    - name: getCard3DDetails
      path: /ppp/api/v1/getCard3DDetails.do
      operations:
      - name: getcard3ddetails
        method: POST
        description: Nuvei Get Card 3D Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: authenticate3d
      path: /ppp/api/v1/authenticate3d.do
      operations:
      - name: authenticate3d
        method: POST
        description: Nuvei Authenticate 3D
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: three-ds-rest
    port: 8080
    resources:
    - path: /v1/three-ds/details
      name: getCard3DDetails
      operations:
      - method: POST
        name: getcard3ddetails
        call: three-ds.getcard3ddetails
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/three-ds/authenticate
      name: authenticate3d
      operations:
      - method: POST
        name: authenticate3d
        call: three-ds.authenticate3d
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: three-ds-mcp
    port: 9090
    transport: http
    tools:
    - name: nuvei-get-card-3d-details
      description: Nuvei Get Card 3D Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: three-ds.getcard3ddetails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nuvei-authenticate-3d
      description: Nuvei Authenticate 3D
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: three-ds.authenticate3d
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
