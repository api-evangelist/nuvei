naftiko: 1.0.0-alpha2
info:
  label: Nuvei DCC API — Conversions
  description: Dynamic Currency Conversion quote retrieval at checkout.
  tags:
  - Nuvei
  - DCC
  - FX
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    NUVEI_MERCHANT_ID: NUVEI_MERCHANT_ID
    NUVEI_MERCHANT_SITE_ID: NUVEI_MERCHANT_SITE_ID
    NUVEI_MERCHANT_SECRET_KEY: NUVEI_MERCHANT_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: dcc
    baseUri: https://secure.safecharge.com
    resources:
    - name: getDccDetails
      path: /ppp/api/v1/getDccDetails.do
      operations:
      - name: getdccdetails
        method: POST
        description: Nuvei Get DCC Details
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: dcc-rest
    port: 8080
    resources:
    - path: /v1/dcc/details
      name: getDccDetails
      operations:
      - method: POST
        name: getdccdetails
        call: dcc.getdccdetails
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dcc-mcp
    port: 9090
    transport: http
    tools:
    - name: nuvei-get-dcc-details
      description: Nuvei Get DCC Details
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dcc.getdccdetails
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
