naftiko: 1.0.0-alpha2
info:
  label: Nuvei Payments API — Financial Operations
  description: Settle, void, and refund operations for previously authorized or settled Nuvei
    transactions.
  tags:
  - Nuvei
  - Payments
  - Refunds
  created: '2026-05-24'
  modified: '2026-05-24'
binds:
- namespace: env
  keys:
    NUVEI_MERCHANT_ID: NUVEI_MERCHANT_ID
    NUVEI_MERCHANT_SITE_ID: NUVEI_MERCHANT_SITE_ID
    NUVEI_MERCHANT_SECRET_KEY: NUVEI_MERCHANT_SECRET_KEY
capability:
  consumes:
  - type: http
    namespace: payments-refunds
    baseUri: https://secure.safecharge.com
    resources:
    - name: settleTransaction
      path: /ppp/api/v1/settleTransaction.do
      operations:
      - name: settletransaction
        method: POST
        description: Nuvei Settle Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: voidTransaction
      path: /ppp/api/v1/voidTransaction.do
      operations:
      - name: voidtransaction
        method: POST
        description: Nuvei Void Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    - name: refundTransaction
      path: /ppp/api/v1/refundTransaction.do
      operations:
      - name: refundtransaction
        method: POST
        description: Nuvei Refund Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          required: true
    authentication:
      type: none
  exposes:
  - type: rest
    namespace: payments-refunds-rest
    port: 8080
    resources:
    - path: /v1/settle
      name: settleTransaction
      operations:
      - method: POST
        name: settletransaction
        call: payments-refunds.settletransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/void
      name: voidTransaction
      operations:
      - method: POST
        name: voidtransaction
        call: payments-refunds.voidtransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/refund
      name: refundTransaction
      operations:
      - method: POST
        name: refundtransaction
        call: payments-refunds.refundtransaction
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: payments-refunds-mcp
    port: 9090
    transport: http
    tools:
    - name: nuvei-settle-transaction
      description: Nuvei Settle Transaction
      hints:
        readOnly: false
        destructive: false
        idempotent: true
      call: payments-refunds.settletransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nuvei-void-transaction
      description: Nuvei Void Transaction
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: payments-refunds.voidtransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: nuvei-refund-transaction
      description: Nuvei Refund Transaction
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: payments-refunds.refundtransaction
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
