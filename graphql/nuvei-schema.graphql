"""
Nuvei GraphQL API Schema
Conceptual schema derived from the Nuvei REST API covering payment processing,
payment methods, refunds, payouts, subscriptions, fraud management, 3DS authentication,
and transaction reporting across multiple currencies and regions.
"""

schema {
  query: Query
  mutation: Mutation
}

# ─── Root Types ───────────────────────────────────────────────────────────────

type Query {
  """Get a session token for authenticating subsequent API calls."""
  sessionToken(input: SessionTokenInput!): SessionTokenResponse

  """Get the status of a payment transaction."""
  paymentStatus(input: PaymentStatusInput!): PaymentStatusResponse

  """Get available payment methods for a merchant."""
  merchantPaymentMethods(input: MerchantPaymentMethodsInput!): MerchantPaymentMethodsResponse

  """Get supported countries for a merchant."""
  merchantCountries(input: MerchantCountriesInput!): MerchantCountriesResponse

  """Get stored user payment options (vault)."""
  userPaymentOptions(input: UserPaymentOptionsInput!): UserPaymentOptionsResponse

  """Get DCC (Dynamic Currency Conversion) details for a card BIN and currency pair."""
  dccDetails(input: DccDetailsInput!): DccDetailsResponse

  """Get 3D Secure card authentication details."""
  card3DDetails(input: Card3DDetailsInput!): Card3DDetailsResponse

  """List transactions with optional filters."""
  transactions(input: TransactionListInput!): TransactionListResponse

  """Get a single transaction by its ID."""
  transaction(merchantId: String!, merchantSiteId: String!, transactionId: String!): Transaction

  """Get subscription details."""
  subscription(input: SubscriptionQueryInput!): Subscription

  """List subscriptions for a user."""
  userSubscriptions(input: UserSubscriptionsInput!): UserSubscriptionsResponse

  """Get fraud assessment for a transaction."""
  fraudAssessment(input: FraudAssessmentInput!): FraudAssessmentResponse

  """List available currencies."""
  currencies(merchantId: String!, merchantSiteId: String!): [Currency!]!

  """List webhook/DMN event history."""
  webhookEvents(input: WebhookEventListInput!): WebhookEventListResponse
}

type Mutation {
  """Open/create a new order prior to payment."""
  openOrder(input: OpenOrderInput!): OrderResponse

  """Update an existing order."""
  updateOrder(input: UpdateOrderInput!): OrderResponse

  """Execute a payment transaction."""
  payment(input: PaymentInput!): PaymentResponse

  """Settle a pre-authorized (captured) transaction."""
  settleTransaction(input: SettleTransactionInput!): TransactionActionResponse

  """Void a transaction (cancel before settlement)."""
  voidTransaction(input: VoidTransactionInput!): TransactionActionResponse

  """Refund a settled transaction."""
  refundTransaction(input: RefundTransactionInput!): TransactionActionResponse

  """Initiate a payout to a consumer or counterparty."""
  payout(input: PayoutInput!): PayoutResponse

  """Add a credit/debit card as a User Payment Option."""
  addUPOCreditCard(input: AddUPOCreditCardInput!): UPOResponse

  """Add an alternative payment method as a User Payment Option."""
  addUPOAPM(input: AddUPOAPMInput!): UPOResponse

  """Edit an existing credit card UPO."""
  editUPOCreditCard(input: EditUPOCreditCardInput!): UPOResponse

  """Edit an existing APM UPO."""
  editUPOAPM(input: EditUPOAPMInput!): UPOResponse

  """Delete a User Payment Option."""
  deleteUPO(input: DeleteUPOInput!): UPOActionResponse

  """Enable a previously disabled UPO."""
  enableUPO(input: UPOStatusInput!): UPOActionResponse

  """Disable a UPO without deleting it."""
  disableUPO(input: UPOStatusInput!): UPOActionResponse

  """Complete 3D Secure 2 authentication."""
  authenticate3D(input: Authenticate3DInput!): Authenticate3DResponse

  """Create or update a subscription plan."""
  upsertSubscription(input: UpsertSubscriptionInput!): Subscription

  """Cancel a subscription."""
  cancelSubscription(input: CancelSubscriptionInput!): SubscriptionActionResponse
}

# ─── Enums ────────────────────────────────────────────────────────────────────

enum TransactionStatus {
  APPROVED
  DECLINED
  ERROR
  PENDING
  PROCESSING
  CHARGEBACK
  VOID
  SETTLED
}

enum TransactionType {
  PAYMENT
  SETTLE
  VOID
  REFUND
  PAYOUT
  AUTH
  CREDIT
  PREAUTH
}

enum PaymentMethodType {
  CREDIT_CARD
  DEBIT_CARD
  APM
  WALLET
  BANK_TRANSFER
  CASH_VOUCHER
  BNPL
  CRYPTO
}

enum CardType {
  VISA
  MASTERCARD
  AMEX
  DISCOVER
  DINERS
  JCB
  UNIONPAY
  MAESTRO
}

enum ThreeDS2ChallengeIndicator {
  NO_PREFERENCE
  NO_CHALLENGE_REQUESTED
  CHALLENGE_REQUESTED
  CHALLENGE_MANDATE
}

enum ThreeDSStatus {
  Y
  N
  U
  A
  C
  R
}

enum SubscriptionStatus {
  ACTIVE
  PAUSED
  CANCELLED
  EXPIRED
  PENDING
}

enum SubscriptionRecurrenceType {
  DAILY
  WEEKLY
  MONTHLY
  QUARTERLY
  ANNUAL
}

enum WebhookEventType {
  PAYMENT
  REFUND
  VOID
  SETTLE
  PAYOUT
  CHARGEBACK
  CONTROL_PANEL
  SUBSCRIPTION
}

enum UPOStatus {
  ENABLED
  DISABLED
  DELETED
}

enum FraudDecision {
  APPROVE
  REVIEW
  DECLINE
  CHALLENGE
}

enum DccMarkupType {
  PERCENTAGE
  FIXED
}

