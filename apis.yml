apis:
- aid: nuvei:nuvei-payments-api
  name: Nuvei Payments API
  tags:
  - Payments
  - Authorization
  - Settlement
  - Refund
  - Void
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Server-to-server REST API for processing card and APM transactions
    through Nuvei. Includes openOrder for session setup, payment for end-to-end transactions,
    settleTransaction for capturing pre-authorized amounts, refundTransaction for
    refunds, voidTransaction for cancellations, and getPaymentStatus for transaction
    state. Auth uses SHA-256 checksum over merchantId, merchantSiteId, clientRequestId,
    amount, currency, timeStamp, and merchantSecretKey.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-payments-api-openapi.yml
  - type: JSONSchema
    url: json-schema/nuvei-payment-schema.json
  - type: JSONSchema
    url: json-schema/nuvei-transaction-schema.json
  - url: graphql/nuvei-graphql.md
    type: GraphQL
- aid: nuvei:nuvei-session-api
  name: Nuvei Session API
  tags:
  - Sessions
  - Tokens
  - Authentication
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Generates and manages session tokens (getSessionToken) used to authenticate
    subsequent REST calls and Web SDK operations. Session tokens are scoped to a merchant
    and order and have a short lifetime.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-session-api-openapi.yml
- aid: nuvei:nuvei-order-api
  name: Nuvei Order API
  tags:
  - Orders
  - Cart
  - Checkout
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Creates and updates orders prior to payment via openOrder and updateOrder.
    Supports line items, billing/shipping addresses, currency, device details, and
    dynamic descriptors. Used as the first step for Web SDK, Simply Connect, and Payment
    Page integrations.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-order-api-openapi.yml
- aid: nuvei:nuvei-payouts-api
  name: Nuvei Payouts API
  tags:
  - Payouts
  - Withdrawals
  - Disbursement
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Pushes funds out to consumers and counterparties via card, bank account,
    and a wide set of local APMs. The payout endpoint supports referenced (relatedTransactionId)
    and unreferenced (account number / IBAN) payouts and integrates with accountCapture
    to collect destination details safely.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-payouts-api-openapi.yml
- aid: nuvei:nuvei-user-payment-options-api
  name: Nuvei User Payment Options API
  tags:
  - Tokens
  - Vault
  - User Payment Options
  - Cards
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Manages stored payment instruments (User Payment Options / UPOs) including
    card and APM tokenization. Supports addUPOCreditCard, addUPOAPM, editUPOCreditCard,
    editUPOAPM, deleteUPO, getUserUPOs, and enableUPO/disableUPO.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-user-payment-options-api-openapi.yml
- aid: nuvei:nuvei-merchant-config-api
  name: Nuvei Merchant Configuration API
  tags:
  - Merchant
  - Configuration
  - Payment Methods
  - Countries
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Returns configuration data for a merchant including supported countries
    (getMerchantCountries) and the active set of payment methods per country (getMerchantPaymentMethods).
    Used by client checkouts to render dynamic payment selection.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-merchant-config-api-openapi.yml
- aid: nuvei:nuvei-3ds-api
  name: Nuvei 3DS API
  tags:
  - 3DS
  - SCA
  - Authentication
  - Cards
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: 3D Secure 2 authentication endpoints. getCard3DDetails returns DS information
    and challenge requirements for a card; authenticate3d completes the authentication
    flow returning CAVV and ECI. Designed to satisfy PSD2 SCA requirements for EEA
    acquiring.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-3ds-api-openapi.yml
- aid: nuvei:nuvei-dcc-api
  name: Nuvei DCC API
  tags:
  - DCC
  - Currency Conversion
  - FX
  humanURL: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  baseURL: https://secure.safecharge.com/ppp/api/v1/
  description: Dynamic Currency Conversion. getDccDetails computes the converted amount
    and markup rate for a card BIN and currency pair so merchants can present a localized
    currency offer at checkout.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/server-to-server/server-to-server-introduction/
  - type: OpenAPI
    url: openapi/nuvei-dcc-api-openapi.yml
- aid: nuvei:nuvei-webhooks-dmn
  name: Nuvei Direct Merchant Notifications (DMN)
  tags:
  - Webhooks
  - Events
  - Notifications
  - DMN
  humanURL: https://docs.nuvei.com/documentation/integration/webhooks/
  description: Asynchronous webhook notifications sent from Nuvei to a merchant endpoint
    to communicate the final status of payments, payouts, refunds, voids, settles,
    and Control Panel events. Payment DMNs include an advanceResponseChecksum signed
    with the merchantSecretKey using SHA-256 over the ordered parameter values; withdrawal
    DMNs concatenate name=value pairs with the secret appended.
  properties:
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/webhooks/
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/webhooks/payment-dmns/
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/webhooks/withdrawal-dmns/
  - type: Documentation
    url: https://docs.nuvei.com/documentation/integration/webhooks/control-panel/
  - type: AsyncAPI
    url: asyncapi/nuvei-dmn-asyncapi.yml
