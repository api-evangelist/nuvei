features:
- name: Local Acquiring in 52 Markets
  description: Nuvei operates as a licensed acquirer across 52 markets, enabling merchants
    to use local card rails for higher approval rates and lower interchange costs.
- name: 700+ Alternative Payment Methods
  description: Single integration to over 700 APMs including digital wallets, bank
    transfers, cash voucher, BNPL, and local schemes spanning 200+ markets.
- name: 150+ Currencies and Dynamic Currency Conversion
  description: Multi-currency processing with optional DCC at the cardholder level,
    FX settlement, and localized pricing options.
- name: Payouts to 200+ Markets
  description: Push funds to cards (Visa Direct, Mastercard Send), bank accounts,
    and local APMs.
- name: PCI DSS Level 1 and 3DS2 Out-of-the-Box
  description: Web SDK and hosted solutions remove PCI scope; 3DS2 authentication
    is built into the gateway for PSD2 SCA compliance.
- name: Direct Merchant Notifications (DMN) Webhooks
  description: Server-to-server async notifications for payments, payouts, refunds,
    voids, settles, and Control Panel events; signed with merchantSecretKey-based
    SHA-256 checksum.
- name: Tokenization and User Payment Options (UPOs)
  description: Network and gateway tokenization for cards and APMs with vaulted UPOs
    supporting one-click checkout and recurring payments.
- name: iGaming and Sports Betting Specialization
  description: Purpose-built risk, payouts, and KYC flows for regulated iGaming markets
    including instant withdrawals and cashier helpers.
- name: Payment Orchestration and Smart Routing
  description: Routes transactions across multiple acquirers and APMs for cost, approval,
    and availability optimization.
- name: Cashier and Payment Page Hosted Solutions
  description: Drop-in checkout (Simply Connect, Web SDK, Payment Page) and Cashier
    helpers minimize PCI scope and accelerate time-to-market.
useCases:
- name: Global eCommerce Checkout
  description: Single integration delivering cards plus 700+ APMs across 200 markets
    with local acquiring where available.
- name: Marketplace Payouts
  description: Disburse funds to sellers and gig workers via cards, bank accounts,
    and local APMs in 200+ markets.
- name: iGaming Deposits and Withdrawals
  description: Cashier-grade UX for instant deposits and fast payouts in regulated
    jurisdictions.
- name: Subscription and Recurring Billing
  description: Vaulted UPOs, network tokens, and account updater for high-retention
    recurring revenue.
- name: B2B and Cross-Border Payments
  description: Multi-currency acceptance and settlement with FX management and DCC
    offers.
- name: Travel and Hospitality
  description: Multi-currency pricing, deferred capture (auth-and-settle), and refund/void
    flows tailored to travel booking lifecycles.
