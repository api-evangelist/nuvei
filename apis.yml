name: Nuvei
description: Nuvei is a global payment technology company headquartered in Montreal,
  Canada, providing a single platform for online card acquiring, alternative payment
  methods (700+ APMs), payouts, currency management across 150+ currencies, risk and
  fraud, and payment orchestration. Nuvei serves merchants in 200+ markets with local
  acquiring in 52 markets across eCommerce, iGaming, sports betting, travel, retail,
  B2B, and financial services. Originally listed on Nasdaq and TSX as NVEI, Nuvei
  was taken private by Advent International in 2024.
